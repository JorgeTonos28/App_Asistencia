<script>
/*! Minimal SignaturePad (compat API) – MIT */
(function (global) {
  class SignaturePad {
    constructor(canvas, opts) {
      if (!canvas) throw new Error('SignaturePad: canvas requerido');
      this.canvas = canvas;
      this.ctx = canvas.getContext('2d');
      this.options = Object.assign({ penColor: '#111', lineWidth: 2 }, opts || {});
      this._drawing = false;
      this._empty = true;

      this._resize = this._resize.bind(this);
      this._onDown = this._onDown.bind(this);
      this._onMove = this._onMove.bind(this);
      this._onUp = this._onUp.bind(this);

      this._setup();
    }

    _setup() {
      this.canvas.style.touchAction = 'none'; // evita scroll al firmar
      this.ctx.lineCap = 'round';
      this.ctx.lineJoin = 'round';
      this.ctx.strokeStyle = this.options.penColor;
      this.ctx.lineWidth = this.options.lineWidth;

      // Ajuste inicial a DPI real del dispositivo
      this._resize();
      window.addEventListener('resize', this._resize);

      // Eventos Pointer (cubren mouse + touch + stylus)
      this.canvas.addEventListener('pointerdown', this._onDown, { passive: false });
      this.canvas.addEventListener('pointermove', this._onMove, { passive: false });
      document.addEventListener('pointerup', this._onUp, { passive: false });
    }

    _resize() {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = this.canvas.getBoundingClientRect();
      // Guarda contenido previo si quieres persistir tras resize (opcional)
      const prev = this.canvas.toDataURL();
      this.canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      this.canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      this.ctx.setTransform(ratio, 0, 0, ratio, 0, 0); // escala
      this.ctx.lineCap = 'round';
      this.ctx.lineJoin = 'round';
      this.ctx.strokeStyle = this.options.penColor;
      this.ctx.lineWidth = this.options.lineWidth;
      // Nota: por simplicidad no re-dibujamos la firma previa tras resize.
    }

    clear() {
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this._empty = true;
    }

    isEmpty() {
      return this._empty;
    }

    toDataURL(type) {
      return this.canvas.toDataURL(type || 'image/png');
    }

    _onDown(e) {
      e.preventDefault();
      const p = this._pos(e);
      this._drawing = true;
      this._empty = false;
      this.ctx.beginPath();
      this.ctx.moveTo(p.x, p.y);
    }

    _onMove(e) {
      if (!this._drawing) return;
      e.preventDefault();
      const p = this._pos(e);
      this.ctx.lineTo(p.x, p.y);
      this.ctx.stroke();
    }

    _onUp() {
      if (!this._drawing) return;
      this._drawing = false;
      this.ctx.closePath();
    }

    _pos(e) {
      const rect = this.canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
  }

  global.SignaturePad = SignaturePad;
})(this);
</script>
