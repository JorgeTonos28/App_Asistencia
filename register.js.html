<script>
let sigPad;
const $ = s => document.querySelector(s);

// Busy manager (overlay) with simple ref counting
const Busy = (() => {
  let pending = 0;
  const el = () => $('#overlay');

  function show(msg){
    const o=el();
    if(!o) return;
    o.querySelector('.overlay-msg').textContent = msg||'Procesando…';
    pending++;
    o.classList.remove('hidden'); // Tailwind hidden
  }

  function hide(){
    const o=el();
    if(!o) return;
    pending=Math.max(0,pending-1);
    if(pending===0) o.classList.add('hidden');
  }

  function reset(){
    const o=el();
    if(!o) return;
    pending=0;
    o.classList.add('hidden');
  }
  return {show, hide, reset};
})();

function showModal(msg, title='Atención'){
  $('#modalMsg').textContent = msg;
  $('#modalTitle').textContent = title;
  $('#modal').classList.remove('hidden');
}
function hideModal(){
  $('#modal').classList.add('hidden');
}

function esFechaLarga(d){
  // d viene como string o Date
  if(!d) return '';
  // Try parsing if string
  let dateObj = new Date(d);
  if (isNaN(dateObj.getTime())) return d; // Fallback if invalid

  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const s = dateObj.toLocaleDateString('es-DO', opts);

  // Capitalize magic
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function init(){
  // Initial Overlay
  Busy.show('Cargando…');

  // Failsafe: force remove overlay after 4 seconds regardless of errors
  setTimeout(() => {
     Busy.reset();
  }, 4000);

  try {
    // Resize canvas for high DPI
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Firma
    const canvas = document.getElementById('pad');
    sigPad = new SignaturePad(canvas, {
       backgroundColor: 'rgba(255, 255, 255, 0)',
       penColor: 'rgb(0, 0, 0)'
    });

    $('#btnLimpiar').onclick = () => sigPad.clear();
    $('#btnEnviar').onclick = enviar;
    $('#modalOk').onclick = hideModal;

    // "Register Other" button logic
    const btnOther = document.getElementById('btnRegisterOther');
    if(btnOther) {
       btnOther.onclick = function() {
          $('#statusCard').classList.add('hidden');
          $('#formCard').classList.remove('hidden');
          $('#formCard').classList.add('animate-slide-up');
       };
    }

    const btnResetPublic = document.getElementById('btnResetFormPublic');
    if (btnResetPublic) btnResetPublic.onclick = resetFormularioPublico;

    // 1) Cargar logo
    const logo = document.getElementById('logoInfotep');
    const logoReady = new Promise((resolve)=>{
      let resolved = false;
      function done(){ if (!resolved){ resolved = true; resolve(); } }

      // Timeout safety for the logo promise specifically
      setTimeout(done, 3000);

      try {
        google.script.run
          .withSuccessHandler((dataUrl)=>{
            if (dataUrl){
              logo.onload = () => { logo.onload = logo.onerror = null; done(); };
              logo.onerror = () => { logo.onload = logo.onerror = null; done(); };
              logo.src = dataUrl;
            } else {
              // Fallback text
              logo.remove();
              const ph = document.createElement('h2');
              ph.textContent = 'INFOTEP';
              ph.className = 'text-2xl font-bold text-brand-700';
              const header = document.querySelector('header .flex');
              if(header) header.appendChild(ph);
              done();
            }
          })
          .withFailureHandler((e)=>{
             console.warn('Logo fetch failed', e);
             done();
          })
          .getLogoDataUrl(256);
      } catch(e) {
          console.error('google.script.run error', e);
          done();
      }
    });

    // 2) Finish setup
    logoReady.then(()=>{
      const fl = esFechaLarga(window.__EVENT_FECHA__);
      const fEl = document.getElementById('fechaLarga');
      if(fEl) fEl.innerText = fl;
      // Normal reset
      Busy.reset();
    });

    // Autocomplete
    const cod = $('#codigo');
    if(cod){
      cod.addEventListener('change', lookupCodigo);
      cod.addEventListener('blur', lookupCodigo);
    }
  } catch(e) {
    console.error('Init crashed', e);
    // ensure overlay is gone if crash
    Busy.reset();
  }
}

function resizeCanvas() {
  const canvas = document.getElementById('pad');
  if(!canvas) return;
  const ratio =  Math.max(window.devicePixelRatio || 1, 1);
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  const ctx = canvas.getContext("2d");
  if(ctx) ctx.scale(ratio, ratio);

  if(sigPad) sigPad.clear(); // Clears content on resize
}

function lookupCodigo(){
  const codigo = $('#codigo').value.trim();
  if (!codigo) return;
  // Debounce/Check minimal length?
  if(codigo.length < 3) return;

  Busy.show('Buscando datos…');
  google.script.run
    .withSuccessHandler((res)=>{
      Busy.hide();
      if (res && res.ok && res.participante){
        $('#nombre').value = res.participante.nombre || '';
        $('#correo').value = res.participante.correo || '';
        $('#tel').value    = res.participante.telefono || '';
      }
    })
    .withFailureHandler((err)=>{ Busy.hide(); console.error('Lookup failed', err); })
    .findParticipanteByCodigo(codigo);
}

function enviar(){
  const codigo = $('#codigo').value.trim();
  const nombre = $('#nombre').value.trim();
  const correo = $('#correo').value.trim();
  const telefono = $('#tel').value.trim();

  if (!codigo || !nombre || !correo || sigPad.isEmpty()){
    showModal('Por favor completa todos los campos obligatorios y firma.', 'Faltan datos');
    return;
  }

  const firma_b64 = sigPad.toDataURL();

  Busy.show('Registrando asistencia…');
  google.script.run
    .withSuccessHandler((res)=>{
      Busy.hide();
      if (typeof res === 'string'){ try{ res = JSON.parse(res); }catch{} }

      if (res && res.ok){
        resetFormularioPublico();
        showModal('¡Registro completado exitosamente!', 'Éxito');
      } else if (res && res.code==='DUPLICATE'){
        showModal('Esta persona ya se encuentra registrada para este evento.', 'Duplicado');
      } else {
        showModal('No se pudo registrar: ' + (res && (res.msg||res.error) || 'Error desconocido'), 'Error');
      }
    })
    .withFailureHandler((err)=>{
       Busy.hide();
       console.error('Submit failed', err);
       showModal('Ocurrió un error de conexión. Intenta de nuevo.', 'Error');
    })
    .registrarAsistencia({event_id: window.__EVENT_ID__, codigo, nombre, correo, telefono, firma_b64, via:'public'});
}

function resetFormularioPublico(){
  $('#codigo').value = '';
  $('#nombre').value = '';
  $('#correo').value = '';
  $('#tel').value = '';
  if (sigPad) sigPad.clear();
}

document.addEventListener('DOMContentLoaded', init);
</script>
