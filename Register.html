  <!-- Script anti-wrapper (responsive fix) -->
  <script>
  (function(){
    try{
      // Si estamos embebidos (iframe del editor de Google) y la pantalla es pequeña → salir al top
      var isFramed = (window.top !== window.self);
      var isSmall = Math.max(screen.width, screen.height) <= 880;
      if (isFramed && isSmall) {
        window.top.location.href = window.location.href;
      }
    }catch(e){}
  })();
  </script>

<body class="container">
  <header class="card" style="text-align:center">
    <img id="logoInfotep" alt="INFOTEP" />
    <h1><?= evento.nombre ?></h1>
    <p id="fechaLarga"></p>
  </header>

  <section class="card">
    <div class="row g inputs-line">
      <input id="codigo" placeholder="Código (empleado) *" />
      <input id="nombre" placeholder="Nombre completo *" />
      <input id="correo" type="email" placeholder="Correo electrónico *" />
      <input id="tel" placeholder="Número de teléfono" />

      </button>
    </div>

    <p>Firma digital *</p>
    <div class="sig-wrap">

  </div>

  <!-- Overlay de proceso -->
  <div id="overlay" class="overlay" hidden>
    <div class="spinner"></div>
    <div class="overlay-msg">Procesando…</div>
  </div>
